name: KPI Hub Content Pipeline

on:
  schedule:
    # Every 48 hours at 03:30 AM IST (22:00 UTC previous day)
    - cron: '0 22 */2 * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual run from GitHub Actions'

jobs:
  run-pipeline:
    name: Run 5-Engine Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KPI Hub Pipeline
        run: python pipeline.py
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          WP_SITE_URL:         ${{ secrets.WP_SITE_URL }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          ALPHA_VANTAGE_KEY:   ${{ secrets.ALPHA_VANTAGE_KEY }}

      - name: Upload pipeline logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-log-${{ github.run_number }}
          path: pipeline.log
          retention-days: 14
